<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智能集装箱装柜计算器</title>
    <link rel="stylesheet" href="styles.css?v=20260604-manual" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="装柜参数">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">▣</span>
          <div>
            <h1>智能装柜助手</h1>
            <p>纸箱装载量与排布可视化</p>
          </div>
        </div>

        <form id="packing-form" class="form-grid">
          <fieldset>
            <legend>集装箱规格</legend>
            <label>
              柜型
              <select id="container-type" name="containerType">
                <option value="20GP">20GP</option>
                <option value="40GP">40GP</option>
                <option value="40HQ">40HQ</option>
              </select>
            </label>
            <div class="triple-grid">
              <label>
                长 mm
                <input id="container-length" type="number" min="1" step="1" />
              </label>
              <label>
                宽 mm
                <input id="container-width" type="number" min="1" step="1" />
              </label>
              <label>
                高 mm
                <input id="container-height" type="number" min="1" step="1" />
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>码垛模式</legend>
            <div class="segmented-control" role="radiogroup" aria-label="码垛模式">
              <label>
                <input type="radio" name="packing-mode" value="single" checked />
                单 SKU
              </label>
              <label>
                <input type="radio" name="packing-mode" value="multi" />
                多 SKU
              </label>
            </div>
            <label id="sku-count-row" class="range-row hidden">
              SKU 个数
              <input id="sku-count" type="range" min="2" max="10" value="2" />
              <strong id="sku-count-value">2</strong>
            </label>
            <label id="sku-strategy-row" class="hidden">
              装载策略
              <select id="sku-strategy">
                <option value="multi-destination">分客户/多卸货地</option>
                <option value="same-destination">同客户/同卸货地</option>
              </select>
            </label>
          </fieldset>

          <fieldset>
            <legend>纸箱规格</legend>
            <div id="single-sku-fields" class="triple-grid">
              <label>
                长 mm
                <input id="carton-length" type="number" min="1" step="1" value="480" />
              </label>
              <label>
                宽 mm
                <input id="carton-width" type="number" min="1" step="1" value="320" />
              </label>
              <label>
                高 mm
                <input id="carton-height" type="number" min="1" step="1" value="260" />
              </label>
            </div>
            <div id="sku-list" class="sku-list hidden" aria-label="SKU 列表"></div>
          </fieldset>

          <fieldset>
            <legend>箱体颜色</legend>
            <div class="color-row">
              <input id="carton-color" type="color" value="#d8923a" />
              <span id="color-value">RGB 216, 146, 58</span>
            </div>
          </fieldset>

          <div class="calculate-actions">
            <button id="calculate-button" type="button">计算装载</button>
          </div>
        </form>

        <section class="summary-stack" aria-label="计算结果">
          <div class="hero-number">
            <span>最大装载量</span>
            <strong id="total-boxes">0</strong>
            <em>cartons</em>
          </div>
          <div class="metric-grid">
            <div>
              <span>每层数量</span>
              <strong id="per-layer-count">0</strong>
            </div>
            <div>
              <span>层数</span>
              <strong id="layer-count">0</strong>
            </div>
            <div>
              <span>已用高度</span>
              <strong id="used-height">0 mm</strong>
            </div>
            <div>
              <span>体积利用</span>
              <strong id="utilization">0%</strong>
            </div>
          </div>
          <dl class="detail-list">
            <div>
              <dt>排布模式</dt>
              <dd id="pattern-name">-</dd>
            </div>
            <div>
              <dt>占用长度</dt>
              <dd id="occupied-length">0 mm</dd>
            </div>
            <div>
              <dt>占用宽度</dt>
              <dd id="occupied-width">0 mm</dd>
            </div>
            <div>
              <dt>角件避让</dt>
              <dd id="blocked-count">0 箱</dd>
            </div>
          </dl>
          <section id="sku-breakdown" class="sku-breakdown hidden" aria-label="SKU 装载结果"></section>
        </section>
      </section>

      <section class="workbench" aria-label="装柜可视化">
        <div class="top-strip">
          <div class="status-line">
            <span id="status-chip">待计算</span>
            <strong id="progress-text">0 / 0</strong>
          </div>
          <label class="progress-control">
            码垛进度
            <input id="stack-progress" type="range" min="0" max="0" value="0" />
          </label>
        </div>

        <section class="views-grid">
          <article class="view-panel two-d-panel">
            <header>
              <h2>2D 平面排布</h2>
              <span>俯视图</span>
            </header>
            <canvas id="plan-canvas" width="980" height="620"></canvas>
          </article>

          <article class="view-panel three-d-panel">
            <header>
              <h2>3D 货柜渲染</h2>
              <span>透视图</span>
            </header>
            <canvas id="scene-canvas" width="980" height="620"></canvas>
          </article>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
    <script src="packing-core.js?v=20260604-manual"></script>
    <script src="app.js?v=20260604-manual"></script>
  </body>
</html>
